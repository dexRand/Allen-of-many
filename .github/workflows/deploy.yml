# Pubblica su branch gh-pages (Settings → Pages → Deploy from branch → gh-pages / root).
# Non usare "GitHub Actions" come sorgente Pages con mkdocs gh-deploy.

name: Deploy documentazione

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  deploy_docs:
    runs-on: ubuntu-latest
    steps:
      - name: Copia repo nella macchina
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Installa Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Installa dipendenze MkDocs
        run: pip install -r requirements.txt

      - name: Collega note vault per MkDocs
        run: |
          mkdir -p content
          ln -sfn "${{ github.workspace }}/Canon" content/Canon
          ln -sfn "${{ github.workspace }}/404" content/404
          ln -sfn "${{ github.workspace }}/zz_CIcli" content/zz_CIcli
          if [ -d zzz_Attachments ]; then
            ln -sfn "${{ github.workspace }}/zzz_Attachments" content/zzz_Attachments
          fi
          if [ -f ALLEN.md ]; then
            ln -sfn "${{ github.workspace }}/ALLEN.md" content/ALLEN.md
          fi

      - name: Configura Git per gh-deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compila e pubblica su gh-pages
        run: mkdocs gh-deploy --force --remote-name origin --remote-branch gh-pages
