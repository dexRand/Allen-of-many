# Pubblica su branch gh-pages (Settings → Pages → Deploy from branch → gh-pages / root).

name: Deploy documentazione

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  deploy_docs:
    runs-on: ubuntu-latest
    steps:
      - name: Copia repo nella macchina
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Installa Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Installa dipendenze MkDocs
        run: pip install -r requirements.txt

      - name: Prepara content per MkDocs
        run: |
          mkdir -p content
          for dir in Canon 404 zz_CIcli zzz_Attachments; do
            if [ -d "$dir" ]; then
              cp -a "$dir" "content/$dir"
            fi
          done
          if [ -f ALLEN.md ]; then
            cp ALLEN.md content/ALLEN.md
          fi

      - name: Configura Git per gh-deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compila sito
        run: mkdocs build

      - name: Verifica wikilink convertiti
        run: |
          if grep -r '\[\[[^]]\+\]\]' site/ --include='*.html' | grep -v '__md_edit'; then
            echo "::error::Wikilink Obsidian non convertiti nel sito generato."
            exit 1
          fi

      - name: Pubblica su gh-pages
        run: mkdocs gh-deploy --force --remote-name origin --remote-branch gh-pages
