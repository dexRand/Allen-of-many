site_name: Allen of Many
site_url: https://dexrand.github.io/Allen-of-many/
repo_url: https://github.com/dexRand/Allen-of-many
repo_name: dexRand/Allen-of-many

# Cartella generata in CI (symlink alle note); vedi .github/workflows/deploy.yml
docs_dir: content

hooks:
  - hooks/obsidian_links.py
  - hooks/backlinks.py

plugins:
  - search
  - awesome-pages
  - section-index

extra:
  backlinks:
    enabled: true

theme:
  name: material
  language: it
  features:
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
  palette:
    scheme: slate
    primary: indigo
    accent: indigo

markdown_extensions:
  - attr_list
  - md_in_html
